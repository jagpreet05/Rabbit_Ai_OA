name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint & Tests ────────────────────────────────────────────────────
  backend:
    name: Backend — Python checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app --max-line-length=120

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app --ignore-missing-imports

  # ── Frontend Build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Node build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000

  # ── Docker Compose Smoke Test ───────────────────────────────────────────────
  docker:
    name: Docker Compose — smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          cp .env.example .env
          sed -i 's/your_gemini_api_key_here/DUMMY/' .env
          sed -i 's/your_email@gmail.com/ci@example.com/g' .env
          sed -i 's/your_app_password_here/DUMMY/' .env

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8000/ && break || sleep 3
          done

      - name: Stop services
        run: docker compose down
